<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaraWeb – Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #080b12; --card: #111827; --border: rgba(255,255,255,0.07);
    --cyan: #00f0ff; --violet: #a855f7; --green: #22d3a5; --text: #e2e8f0; --muted: #64748b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px); background-size: 60px 60px; }
  .glow { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; }
  .glow-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,240,255,0.1), transparent 70%); top: -100px; left: -100px; }
  .glow-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(168,85,247,0.08), transparent 70%); bottom: -100px; right: -100px; }
  #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  .logo-load { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .spinner { width: 28px; height: 28px; border: 2px solid rgba(0,240,255,0.15); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #auth-content { display: none; position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 24px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 32px; text-decoration: none; display: block; }
  .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px; }
  .auth-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; border-radius: 7px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; color: var(--muted); border: none; background: transparent; }
  .auth-tab.active { background: linear-gradient(135deg, var(--cyan), var(--violet)); color: #000; }
  .form-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
  .form-subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: rgba(0,240,255,0.4); }
  .btn-submit { width: 100%; padding: 13px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--cyan), var(--violet)); color: #000; margin-top: 8px; transition: opacity 0.2s; }
  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.8rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-google { width: 100%; padding: 13px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
  .btn-google:hover { background: rgba(255,255,255,0.03); }
  .alert { padding: 12px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; display: block; }
  .alert-success { background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.2); color: var(--green); display: block; }
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div id="loading-screen">
  <div class="logo-load">KaraWeb</div>
  <div class="spinner"></div>
</div>

<div id="auth-content">
  <a href="index.html" class="logo">KaraWeb</a>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>
    <div class="panel active" id="panel-login">
      <div class="form-title">Bon retour 👋</div>
      <div class="form-subtitle">Connectez-vous à votre espace client</div>
      <div class="alert" id="login-alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="jean@exemple.com"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">Se connecter →</button>
      <div class="divider">ou</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </div>
    <div class="panel" id="panel-register">
      <div class="form-title">Créer un compte</div>
      <div class="form-subtitle">Rejoignez KaraWeb et gérez vos projets</div>
      <div class="alert" id="register-alert"></div>
      <div class="form-group"><label>Nom complet</label><input type="text" id="register-name" placeholder="Jean Dupont"></div>
      <div class="form-group"><label>Email</label><input type="email" id="register-email" placeholder="jean@exemple.com"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="register-password" placeholder="Minimum 6 caractères"></div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()">Créer mon compte →</button>
      <div class="divider">ou</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </div>
  </div>
</div>

<script>
var DASHBOARD = 'https://ykarali2004.github.io/karaweb/dashboard.html';

var db = supabase.createClient(
  'https://midkwlribyrryremnnyd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZGt3bHJpYnlycnlyZW1ubnlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODk3MzMsImV4cCI6MjA5MjQ2NTczM30.SCRohymxA4eenjYJx_gPWPLsV3qstuvD1FIqVGUSbbU'
);

// Écoute les changements d'auth — capte le retour Google
db.auth.onAuthStateChange(function(event, session) {
  if (session) {
    window.location.href = DASHBOARD;
  } else {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('auth-content').style.display = 'block';
  }
});

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
}

function showAlert(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert alert-' + type;
}

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn = document.getElementById('btn-login');
  if (!email || !password) { showAlert('login-alert', 'Remplis tous les champs.', 'error'); return; }
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  db.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
    if (res.error) {
      showAlert('login-alert', 'Email ou mot de passe incorrect.', 'error');
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
    }
    // Si succès → onAuthStateChange redirige automatiquement
  });
}

function doRegister() {
  var name = document.getElementById('register-name').value.trim();
  var email = document.getElementById('register-email').value.trim();
  var password = document.getElementById('register-password').value;
  var btn = document.getElementById('btn-register');
  if (!name || !email || !password) { showAlert('register-alert', 'Remplis tous les champs.', 'error'); return; }
  if (password.length < 6) { showAlert('register-alert', 'Mot de passe trop court (6 caractères min).', 'error'); return; }
  btn.disabled = true;
  btn.textContent = 'Création...';
  db.auth.signUp({ email: email, password: password, options: { data: { full_name: name } } }).then(function(res) {
    if (res.error) {
      showAlert('register-alert', res.error.message, 'error');
    } else {
      showAlert('register-alert', '✓ Compte créé ! Vérifie ton email pour confirmer.', 'success');
    }
    btn.disabled = false;
    btn.textContent = 'Créer mon compte →';
  });
}

function doGoogle() {
  db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: DASHBOARD }
  });
}
</script>
</body>
</html>
