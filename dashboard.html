<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KaraWeb – Dashboard</title>

<!-- ✅ IMPORTANT : Charger Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {
  margin:0;
  background:#06080f;
  color:white;
  font-family:sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#app { display:none; text-align:center; }

.loader {
  text-align:center;
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader" class="loader">
  <h1>KaraWeb</h1>
  <p>Chargement...</p>
</div>

<!-- App -->
<div id="app">
  <h1 id="welcome">Bienvenue</h1>
  <p>Connexion réussie ✅</p>
  <button onclick="logout()">Se déconnecter</button>
</div>

<script>
var AUTH = 'https://ykarali2004.github.io/karaweb/auth.html';

var db = supabase.createClient(
  'https://midkwlribyrryremnnyd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZGt3bHJpYnlycnlyZW1ubnlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODk3MzMsImV4cCI6MjA5MjQ2NTczM30.SCRohymxA4eenjYJx_gPWPLsV3qstuvD1FIqVGUSbbU'
);

async function boot() {
  try {
    // 🔥 récupérer token depuis URL
    var hash = window.location.hash;
    var params = new URLSearchParams(hash.replace('#',''));

    var access_token = params.get('access_token');
    var refresh_token = params.get('refresh_token');

    if (access_token && refresh_token) {
      await db.auth.setSession({
        access_token: access_token,
        refresh_token: refresh_token
      });

      // nettoyer URL
      history.replaceState({}, document.title, window.location.pathname);
    }

    // récupérer user
    const { data } = await db.auth.getUser();

    if (!data || !data.user) {
      window.location.href = AUTH;
      return;
    }

    // afficher app
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    var user = data.user;

    var name =
      user.user_metadata?.full_name ||
      user.user_metadata?.name ||
      user.email;

    document.getElementById('welcome').textContent = "Bienvenue " + name;

  } catch (e) {
    console.error(e);
    window.location.href = AUTH;
  }
}

async function logout() {
  await db.auth.signOut();
  window.location.href = AUTH;
}

boot();
</script>

</body>
</html>
