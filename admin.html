<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KaraWeb – Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#06080f;
      --card:#111827;
      --border:rgba(255,255,255,.08);
      --text:#e5edf7;
      --muted:#8da0b8;
      --cyan:#00e7ff;
      --violet:#8b5cf6;
      --green:#22c55e;
      --red:#ef4444;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,231,255,.08), transparent 25%),
        radial-gradient(circle at bottom right, rgba(139,92,246,.10), transparent 25%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .loader{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .loader-box{
      width:100%;
      max-width:520px;
      background:rgba(17,24,39,.88);
      border:1px solid var(--border);
      border-radius:20px;
      padding:32px;
      text-align:center;
    }

    .brand{
      font-size:38px;
      font-weight:800;
      letter-spacing:-1px;
      margin:0 0 12px;
      background:linear-gradient(90deg,var(--cyan),var(--violet));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    #app{display:none}

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:28px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:34px;
      letter-spacing:-1px;
    }

    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:0;
      padding:12px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{
      background:linear-gradient(90deg,var(--cyan),var(--violet));
      color:#061018;
    }

    .btn-secondary{
      background:#fff;
      color:#000;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      margin-bottom:24px;
    }

    .card{
      background:rgba(17,24,39,.88);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
    }

    .small-label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }

    .big-number{
      font-size:34px;
      font-weight:800;
      letter-spacing:-1px;
      margin:0;
    }

    .section{
      margin-bottom:24px;
    }

    .section-title{
      font-size:22px;
      margin:0 0 14px;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .item{
      background:rgba(17,24,39,.88);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
    }

    .item-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 8px;
    }

    .item-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
      margin:0;
    }

    .badge{
      display:inline-block;
      margin-top:10px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .badge.pending{
      background:rgba(245,158,11,.14);
      color:#fbbf24;
      border:1px solid rgba(245,158,11,.18);
    }

    .badge.progress{
      background:rgba(0,231,255,.12);
      color:var(--cyan);
      border:1px solid rgba(0,231,255,.16);
    }

    .badge.done{
      background:rgba(34,197,94,.12);
      color:#86efac;
      border:1px solid rgba(34,197,94,.18);
    }

    .badge.cancelled{
      background:rgba(239,68,68,.12);
      color:#fca5a5;
      border:1px solid rgba(239,68,68,.18);
    }

    .status{
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-box">
      <h1 class="brand">KaraWeb</h1>
      <p>Chargement de l’espace admin...</p>
    </div>
  </div>

  <div id="app">
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1 class="title">Administration KaraWeb</h1>
          <p class="subtitle" id="adminSubtitle">Vérification du compte admin...</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="goClient()">Espace client</button>
          <button class="btn btn-secondary" onclick="logout()">Se déconnecter</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="small-label">Clients</div>
          <p class="big-number" id="clientsCount">0</p>
        </div>
        <div class="card">
          <div class="small-label">Commandes</div>
          <p class="big-number" id="ordersCount">0</p>
        </div>
        <div class="card">
          <div class="small-label">Admins</div>
          <p class="big-number" id="adminsCount">0</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Toutes les commandes</h2>
        <div id="ordersList" class="list">
          <div class="item">
            <h3 class="item-title">Chargement...</h3>
            <p class="item-text">Récupération des commandes.</p>
          </div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Tous les profils</h2>
        <div id="profilesList" class="list">
          <div class="item">
            <h3 class="item-title">Chargement...</h3>
            <p class="item-text">Récupération des profils.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const AUTH_URL = 'https://ykarali2004.github.io/karaweb/auth.html';
    const DASHBOARD_URL = 'https://ykarali2004.github.io/karaweb/dashboard.html';
    const supabaseUrl = 'https://midkwlribyrryremnnyd.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZGt3bHJpYnlycnlyZW1ubnlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODk3MzMsImV4cCI6MjA5MjQ2NTczM30.SCRohymxA4eenjYJx_gPWPLsV3qstuvD1FIqVGUSbbU';

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    function getStatusClass(status) {
      if (!status) return 'pending';
      const s = status.toLowerCase();
      if (s.includes('cours')) return 'progress';
      if (s.includes('livr')) return 'done';
      if (s.includes('annul')) return 'cancelled';
      if (s.includes('attente')) return 'pending';
      return 'pending';
    }

    function goClient() {
      window.location.href = DASHBOARD_URL;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = AUTH_URL;
    }

    async function loadProfiles() {
      const profilesList = document.getElementById('profilesList');

      const { data, error } = await client
        .from('profiles')
        .select('id, full_name, role')
        .order('full_name', { ascending: true });

      if (error) {
        profilesList.innerHTML = `
          <div class="item">
            <h3 class="item-title">Erreur</h3>
            <p class="item-text">${error.message}</p>
          </div>
        `;
        return;
      }

      document.getElementById('clientsCount').textContent = String(
        data.filter(p => (p.role || 'client') === 'client').length
      );
      document.getElementById('adminsCount').textContent = String(
        data.filter(p => (p.role || 'client') === 'admin').length
      );

      if (!data || data.length === 0) {
        profilesList.innerHTML = `
          <div class="item">
            <h3 class="item-title">Aucun profil</h3>
            <p class="item-text">Aucun utilisateur trouvé.</p>
          </div>
        `;
        return;
      }

      profilesList.innerHTML = data.map(function(profile) {
        return `
          <div class="item">
            <h3 class="item-title">${profile.full_name || 'Utilisateur sans nom'}</h3>
            <p class="item-text">
              ID : ${profile.id}<br>
              Rôle : ${profile.role || 'client'}
            </p>
          </div>
        `;
      }).join('');
    }

    async function loadOrders() {
      const ordersList = document.getElementById('ordersList');

      const { data, error } = await client
        .from('commandes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        ordersList.innerHTML = `
          <div class="item">
            <h3 class="item-title">Erreur</h3>
            <p class="item-text">${error.message}</p>
          </div>
        `;
        return;
      }

      document.getElementById('ordersCount').textContent = String(data?.length || 0);

      if (!data || data.length === 0) {
        ordersList.innerHTML = `
          <div class="item">
            <h3 class="item-title">Aucune commande</h3>
            <p class="item-text">Aucune commande enregistrée.</p>
          </div>
        `;
        return;
      }

      ordersList.innerHTML = data.map(function(order) {
        const badgeClass = getStatusClass(order.statut);
        const prix = order.prix ? Number(order.prix).toFixed(2) + ' €' : 'Prix non défini';

        return `
          <div class="item">
            <h3 class="item-title">${order.titre || 'Commande sans titre'}</h3>
            <p class="item-text">
              Client ID : ${order.client_id || '—'}<br>
              Type : ${order.type_projet || '—'}<br>
              Plan : ${order.plan || '—'}<br>
              Description : ${order.description || '—'}<br>
              Prix : ${prix}
            </p>
            <span class="badge ${badgeClass}">${order.statut || 'Statut inconnu'}</span>
          </div>
        `;
      }).join('');
    }

    async function boot() {
      const { data: userData, error: userError } = await client.auth.getUser();

      if (userError || !userData || !userData.user) {
        window.location.href = AUTH_URL;
        return;
      }

      const user = userData.user;

      const { data: profile, error: profileError } = await client
        .from('profiles')
        .select('id, full_name, role')
        .eq('id', user.id)
        .maybeSingle();

      if (profileError || !profile || profile.role !== 'admin') {
        window.location.href = DASHBOARD_URL;
        return;
      }

      document.getElementById('adminSubtitle').textContent =
        'Connecté en tant qu’administrateur : ' + (profile.full_name || user.email || 'Admin');

      document.getElementById('loader').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      await loadOrders();
      await loadProfiles();
    }

    boot();
  </script>
</body>
</html>
