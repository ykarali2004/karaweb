<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KaraWeb Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.layout {
  display:flex;
  height:100vh;
}

.sidebar {
  width:250px;
  background:#111827;
  padding:20px;
}

.sidebar h2 {
  color:#00e7ff;
}

.nav button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  background:#1f2937;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.nav button:hover {
  background:#374151;
}

.main {
  flex:1;
  padding:30px;
  overflow:auto;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.list-item {
  background:#1f2937;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>KaraWeb Admin</h2>

    <div class="nav">
      <button onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('clients')">Clients</button>
      <button onclick="showPage('orders')">Commandes</button>
      <button onclick="showPage('messages')">Messages</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard">
      <div class="card">
        <h2>Dashboard</h2>
        <p id="stats">Chargement...</p>
      </div>
    </div>

    <!-- CLIENTS -->
    <div id="page-clients" style="display:none;">
      <div class="card">
        <h2>Clients</h2>
        <div id="clientsList"></div>
      </div>
    </div>

    <!-- COMMANDES -->
    <div id="page-orders" style="display:none;">
      <div class="card">
        <h2>Commandes</h2>
        <div id="ordersList"></div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div id="page-messages" style="display:none;">
      <div class="card">
        <h2>Conversations</h2>
        <p>Messagerie à connecter ensuite</p>
      </div>
    </div>

  </div>
</div>

<script>
const client = supabase.createClient(
  'https://midkwlribyrryremnnyd.supabase.co',
  'TA CLE API'
);

function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display='none');
  document.getElementById('page-' + page).style.display='block';
}

async function loadDashboard() {
  const { data: orders } = await client.from('commandes').select('*');
  const { data: users } = await client.from('profiles').select('*');

  document.getElementById('stats').innerHTML =
    "Clients: " + users.length + "<br>Commandes: " + orders.length;
}

async function loadClients() {
  const { data } = await client.from('profiles').select('*');

  document.getElementById('clientsList').innerHTML =
    data.map(c => `
      <div class="list-item">
        <strong>${c.full_name}</strong><br>
        ${c.id}<br>
        Rôle: ${c.role}
      </div>
    `).join('');
}

async function loadOrders() {
  const { data } = await client.from('commandes').select('*');

  document.getElementById('ordersList').innerHTML =
    data.map(o => `
      <div class="list-item">
        <strong>${o.titre}</strong><br>
        ${o.description}<br>
        ${o.prix} €<br>
        ${o.statut}
      </div>
    `).join('');
}

async function init() {
  const { data } = await client.auth.getUser();

  if (!data.user) {
    window.location.href = "auth.html";
    return;
  }

  loadDashboard();
  loadClients();
  loadOrders();
}

init();
</script>

</body>
</html>
